<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COE Subworkflow Catalog</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <header class="hero">
      <p class="eyebrow">Dynatrace Subworkflow Collection</p>
      <h1>COE Subworkflow Catalog</h1>
      <p id="summary-text" class="summary">Loading catalog data...</p>
    </header>

    <main class="container">
      <section class="controls">
        <div class="tabs" role="tablist" aria-label="Section selector">
          <button id="tab-tested" class="tab active" data-section="tested" role="tab" aria-selected="true">
            Tested <span id="count-tested" class="count-chip">0</span>
          </button>
          <button id="tab-untested" class="tab" data-section="untested" role="tab" aria-selected="false">
            Untested <span id="count-untested" class="count-chip">0</span>
          </button>
        </div>

        <div class="filters">
          <label>
            Search
            <input id="search-input" type="search" placeholder="Title, path, guide, tags" />
          </label>
          <label>
            Folder
            <select id="folder-filter">
              <option value="all">All folders</option>
            </select>
          </label>
        </div>
      </section>

      <section class="result-meta">
        <p id="result-count">0 workflows</p>
        <div class="selection-tools">
          <span id="selected-count">0 selected</span>
          <button id="select-all" class="button button-secondary" type="button">Select All</button>
          <button id="generate-terraform" class="button button-secondary" type="button">Generate Terraform Script</button>
        </div>
        <div class="pager">
          <button id="prev-page" class="page-button" type="button">Previous</button>
          <span id="page-info">Page 1 / 1</span>
          <button id="next-page" class="page-button" type="button">Next</button>
        </div>
      </section>

      <section id="catalog" class="catalog" aria-live="polite"></section>
    </main>

    <template id="card-template">
      <article class="card">
        <div class="card-head">
          <label class="select-workflow-label">
            <input class="select-workflow" type="checkbox" />
            <span>Select</span>
          </label>
          <h2 class="card-title"></h2>
          <span class="section-pill"></span>
        </div>
        <div class="card-description"></div>
        <div class="card-actions">
          <button class="button button-guide guide-btn" type="button">📖 View Guide</button>
          <button class="button button-primary download-link" type="button">⬇ Download subworkflow</button>
        </div>
        <p class="download-count"></p>
      </article>
    </template>

    <!-- Guide modal -->
    <div id="guide-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title" class="modal-title"></h2>
          <button id="modal-close" class="modal-close" type="button" aria-label="Close guide">&times;</button>
        </div>
        <div class="modal-body">
          <div id="modal-content" class="modal-guide-markdown"></div>
        </div>
      </div>
    </div>

    <div id="terraform-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="terraform-title" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="terraform-title" class="modal-title">Terraform script for selected workflows</h2>
          <button id="terraform-close" class="modal-close" type="button" aria-label="Close terraform example">&times;</button>
        </div>
        <div class="modal-body">
          <pre id="terraform-content" class="modal-guide-text"></pre>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="./app.js" type="module"></script>
    <script>
      // Close modal on backdrop click
      document.getElementById('guide-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) e.currentTarget.hidden = true;
      });
      // Close modal on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          document.getElementById('guide-modal').hidden = true;
          document.getElementById('terraform-modal').hidden = true;
        }
      });
      document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('guide-modal').hidden = true;
      });

      // Close terraform modal
      document.getElementById('terraform-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) e.currentTarget.hidden = true;
      });
      document.getElementById('terraform-close').addEventListener('click', () => {
        document.getElementById('terraform-modal').hidden = true;
      });
    </script>
  </body>
</html>
