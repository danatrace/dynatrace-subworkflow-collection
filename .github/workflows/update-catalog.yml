name: Update GitHub Pages Catalog

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.json"
      - "**/*.workflow.json"
      - "scripts/generate_catalog_data.py"
      - "scripts/update_puzzle_title_workflows.py"
      - ".github/workflows/update-catalog.yml"

permissions:
  contents: write

jobs:
  regenerate-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate catalog data
        run: python3 scripts/generate_catalog_data.py

      - name: Generate puzzle title workflow array
        run: python3 scripts/update_puzzle_title_workflows.py

      - name: Commit and push if generated files changed
        run: |
          if git diff --quiet -- docs/data/workflows.json puzzle-title-workflows.ts; then
            echo "No generated file changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/workflows.json puzzle-title-workflows.ts
          git commit -m "chore(generated): refresh catalog and puzzle workflow array"
          git push
